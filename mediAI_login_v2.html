<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');
  .medi-root { font-family: 'DM Sans', sans-serif; background: var(--color-background-tertiary); min-height: 600px; display: flex; }
  .medi-sidebar { width: 260px; min-height: 600px; background: #0A1628; padding: 32px 24px; display: flex; flex-direction: column; gap: 0; flex-shrink: 0; }
  .medi-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 48px; }
  .medi-logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #3B82F6, #06B6D4); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .medi-logo-icon svg { width: 20px; height: 20px; }
  .medi-logo-text { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .medi-logo-sub { color: #64748B; font-size: 11px; margin-top: 1px; }
  .sidebar-label { color: #475569; font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px; margin-top: 24px; }
  .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: #94A3B8; font-size: 13px; cursor: pointer; margin-bottom: 2px; transition: all 0.15s; }
  .sidebar-item:hover { background: rgba(255,255,255,0.06); color: #CBD5E1; }
  .sidebar-item.active { background: rgba(59,130,246,0.15); color: #93C5FD; }
  .sidebar-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; flex-shrink: 0; }
  .sidebar-dot.active { background: #3B82F6; opacity: 1; }
  .sidebar-divider { border: none; border-top: 0.5px solid #1E293B; margin: 16px 0; }
  .medi-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .login-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 16px; padding: 40px 36px; width: 380px; }
  .login-header { margin-bottom: 28px; }
  .login-badge { display: inline-flex; align-items: center; gap: 6px; background: #EFF6FF; color: #1D4ED8; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; margin-bottom: 16px; }
  .login-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #3B82F6; }
  .login-title { font-size: 22px; font-weight: 600; color: var(--color-text-primary); letter-spacing: -0.5px; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 6px; letter-spacing: 0.3px; }
  .form-input { width: 100%; padding: 10px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: 8px; font-size: 13px; color: var(--color-text-primary); background: var(--color-background-secondary); box-sizing: border-box; outline: none; font-family: inherit; }
  .form-input:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
  .form-input::placeholder { color: var(--color-text-tertiary); }
  .role-select { display: flex; gap: 8px; margin-bottom: 20px; }
  .role-btn { flex: 1; padding: 9px 8px; border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; color: var(--color-text-secondary); background: var(--color-background-secondary); transition: all 0.15s; font-family: inherit; }
  .role-btn.selected { border-color: #3B82F6; background: #EFF6FF; color: #1D4ED8; }
  .role-icon { font-size: 16px; display: block; margin-bottom: 4px; }
  .login-btn { width: 100%; padding: 11px; background: #1D4ED8; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; letter-spacing: 0.2px; transition: background 0.15s; }
  .login-btn:hover { background: #1E40AF; }
  .login-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .login-divider-line { flex: 1; height: 0.5px; background: var(--color-border-tertiary); }
  .login-divider-text { font-size: 11px; color: var(--color-text-tertiary); }
  .hospital-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; cursor: pointer; }
  .hospital-icon { width: 28px; height: 28px; background: #F1F5F9; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .hospital-name { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }
  .hospital-sub { font-size: 11px; color: var(--color-text-tertiary); }
  .security-row { display: flex; align-items: center; gap: 6px; justify-content: center; margin-top: 20px; color: var(--color-text-tertiary); font-size: 11px; }
  .security-dot { width: 4px; height: 4px; background: #22C55E; border-radius: 50%; }
  .side-info { margin-top: auto; }
  .stat-card { background: #111B2E; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
  .stat-val { color: #93C5FD; font-size: 20px; font-weight: 600; }
  .stat-lbl { color: #475569; font-size: 11px; margin-top: 2px; }
</style>
<div class="medi-root">
  <div class="medi-main">    <div class="login-card">
      <div class="login-header">
        <div class="login-badge"><span class="login-badge-dot"></span>Güvenli Sistem Girişi</div>
        <div class="login-title">Hoş geldiniz</div>
        <div class="login-sub">Klinik kimliğinizle sisteme erişin</div>
      </div>
      <div class="form-group">
        <label class="form-label">Uzmanlık alanı</label>
        <div class="role-select">
          <button class="role-btn selected"><span class="role-icon">👁</span>Oftalmoloji</button>
          <button class="role-btn"><span class="role-icon">🔬</span>Dermatoloji</button>
          <button class="role-btn"><span class="role-icon">⚕</span>Diğer</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">E-posta / Doktor ID</label>
        <input class="form-input" id="login-email" type="text" placeholder="dr.ahmet@hastane.edu.tr">
      </div>
      <div class="form-group">
        <label class="form-label">Şifre</label>
        <input class="form-input" id="login-password" type="password" placeholder="••••••••••">
      </div>
      <div id="login-error" style="color:#ef4444; font-size:12px; margin-bottom:10px; display:none;">Hatalı e-posta veya şifre!</div>
      <button class="login-btn">Sisteme Giriş Yap</button>
      <div style="margin-top: 10px; font-size: 11px; color: #64748B; text-align: center; background: #F1F5F9; padding: 8px; border-radius: 6px;">
        Demo Girişi: <b>admin@mediai.com</b> / <b>123456</b>
      </div>
      <div class="login-divider"><div class="login-divider-line"></div><span class="login-divider-text">veya kurumsal SSO ile</span><div class="login-divider-line"></div></div>
      <div class="hospital-row">
        <div class="hospital-icon">🏥</div>
        <div>
          <div class="hospital-name">Hacettepe Üniversitesi Hastanesi</div>
          <div class="hospital-sub">Kurumsal Active Directory ile devam et</div>
        </div>
      </div>
      <div class="security-row"><span class="security-dot"></span>256-bit TLS şifrelemesi · KVKK uyumlu</div>
    </div>
  </div>
</div>

<script>
function toggleSidebar() {
  var sb = document.querySelector('.sidebar, .medi-sidebar');
  var ov = document.getElementById('overlay');
  if (!sb) return;
  sb.classList.toggle('open');
  if (ov) ov.classList.toggle('open');
}
function closeSidebar() {
  var sb = document.querySelector('.sidebar, .medi-sidebar');
  var ov = document.getElementById('overlay');
  if (sb) sb.classList.remove('open');
  if (ov) ov.classList.remove('open');
}
</script>

<script>
// Sidebar navigasyon
document.addEventListener('DOMContentLoaded', function() {
  var navMap = {
    'Dashboard':        'mediAI_dashboard_v2.html',
    'Görüntü Analizi':  'mediAI_image_analysis_v2.html',
    'Teşhis Sonuçları': 'mediAI_diagnosis_v2.html',
    'Tedavi Planı':     'mediAI_treatment_v2.html',
    'Hasta Profili':    'mediAI_patient_v2.html',
    'Giriş Yap':        'mediAI_login_v2.html',
  };
  document.querySelectorAll('.nav-item, .sidebar-item').forEach(function(item) {
    var text = item.textContent.trim();
    Object.keys(navMap).forEach(function(key) {
      if (text.indexOf(key) !== -1) {
        item.style.cursor = 'pointer';
        item.onclick = function() { window.location.href = navMap[key]; };
      }
    });
  });
  // "Sisteme Giriş Yap" butonu → dashboard
  var loginBtn = document.querySelector('.login-btn');
  if (loginBtn) {
    loginBtn.onclick = function() {
      var email = document.getElementById('login-email');
      var pass = document.getElementById('login-password');
      var err = document.getElementById('login-error');
      
      if(email && pass) {
        if(email.value === 'admin@mediai.com' && pass.value === '123456') {
          localStorage.setItem('isLoggedIn', 'true');
          var orig = loginBtn.innerHTML;
          loginBtn.innerHTML = '<span class="spinner-btn" style="width:16px;height:16px;border:2px solid #fff;border-bottom-color:transparent;border-radius:50%;display:inline-block;animation:spin 1s linear infinite"></span>';
          loginBtn.style.opacity = '0.8';
          setTimeout(function(){ window.location.href = 'mediAI_dashboard_v2.html'; }, 800);
        } else {
          err.style.display = 'block';
        }
      } else {
        window.location.href = 'mediAI_dashboard_v2.html';
      }
    };
  }
  // "Teşhis Oluştur" butonu → teşhis sonuçları
  var teshisBtn = Array.from(document.querySelectorAll('.btn-primary'))
    .find(b => b.textContent.trim() === 'Teşhis Oluştur');
  if (teshisBtn) teshisBtn.onclick = function() {
    window.location.href = 'mediAI_diagnosis_v2.html';
  };
});
</script>

<script src="ui.js"></script>
